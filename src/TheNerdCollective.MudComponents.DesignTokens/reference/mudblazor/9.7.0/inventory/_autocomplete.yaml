component: autocomplete
scss: _autocomplete.scss
classification: P3
family: picker
portal: true
composite_of: [input, inputcontrol, popover, autocomplete]
family_ref: picker
parts:
  - id: input
    selectors: [.mud-autocomplete, .mud-input-control]
    intent: [content, border, channel]
  - id: popup
    selectors: [.mud-popover, .mud-autocomplete-popover]
    intent: [surface, content]
  - id: option-selected
    selectors: [.mud-selected-item, .mud-list-item.mud-selected]
    intent: [channel, surface]
states:
  - name: open
    selectors: [.mud-popover-open]
  - name: selected
    selectors: [.mud-selected-item]
verification:
  - Popover inherits token class via portal bridge; highlighted option uses channel color
generator_required:
  - .mud-selected-item
  - '[class*="mud-popover"]'
  - '[class*="mud-autocomplete"]'
adapter:
  do:
    - InputPatterns + popover surface rules + portal token bridge (shared with select)
  source: MudBlazor v9.7.0 _autocomplete.scss
