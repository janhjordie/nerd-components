name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore TheNerdCollective.Components.sln

      - name: Build
        run: dotnet build TheNerdCollective.Components.sln --no-restore -c Release

      - name: Test
        run: dotnet test TheNerdCollective.Components.sln --no-build -c Release --filter "FullyQualifiedName!~IntegrationTests" --verbosity normal
