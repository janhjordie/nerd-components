name: Publish NuGet Packages

on:
  push:
    branches:
      - main
    paths:
      - 'src/**/*.csproj'
      - 'src/**/*.cs'
      - 'src/**/*.razor'
      - 'src/**/README.md'
      - '.github/workflows/publish-packages.yml'

permissions:
  contents: write
  id-token: write

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      packages: ${{ steps.filter.outputs.packages }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changed packages
        id: filter
        run: |
          # Get list of changed files
          CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD)
          
          # Define package directories
          declare -A PACKAGES=(
            ["TheNerdCollective.Services"]="src/TheNerdCollective.Services"
            ["TheNerdCollective.Services.BlazorServer"]="src/TheNerdCollective.Services.BlazorServer"
            ["TheNerdCollective.Components"]="src/TheNerdCollective.Components"
            ["TheNerdCollective.Components.BlazorServerCircuitHandler"]="src/TheNerdCollective.Components.BlazorServerCircuitHandler"
            ["TheNerdCollective.Blazor.Reconnect"]="src/TheNerdCollective.Blazor.Reconnect"
            ["TheNerdCollective.Blazor.VersionMonitor"]="src/TheNerdCollective.Blazor.VersionMonitor"
            ["TheNerdCollective.Blazor.SessionMonitor"]="src/TheNerdCollective.Blazor.SessionMonitor"
            ["TheNerdCollective.Helpers"]="src/TheNerdCollective.Helpers"
            ["TheNerdCollective.Integrations.Harvest"]="src/TheNerdCollective.Integrations.Harvest"
            ["TheNerdCollective.Integrations.GitHub"]="src/TheNerdCollective.Integrations.GitHub"
            ["TheNerdCollective.Integrations.AzurePipelines"]="src/TheNerdCollective.Integrations.AzurePipelines"
            ["TheNerdCollective.Cli.Trello"]="src/TheNerdCollective.Cli.Trello"
            ["TheNerdCollective.Integrations.Dar"]="src/TheNerdCollective.Integrations.Dar"
            ["TheNerdCollective.MudComponents.MudQuillEditor"]="src/TheNerdCollective.MudComponents.MudQuillEditor"
            ["TheNerdCollective.MudComponents.MudSwiper"]="src/TheNerdCollective.MudComponents.MudSwiper"
            ["TheNerdCollective.MudComponents.HarvestTimesheet"]="src/TheNerdCollective.MudComponents.HarvestTimesheet"
            ["TheNerdCollective.MudComponents.SessionMonitor"]="src/TheNerdCollective.MudComponents.SessionMonitor"
          )
          
          # Detect which packages changed
          PACKAGES_TO_BUILD="[]"
          for pkg_name in "${!PACKAGES[@]}"; do
            pkg_path="${PACKAGES[$pkg_name]}"
            if echo "$CHANGED_FILES" | grep -q "^$pkg_path/"; then
              PACKAGES_TO_BUILD=$(echo "$PACKAGES_TO_BUILD" | jq -c ". += [{\"name\": \"$pkg_name\", \"path\": \"$pkg_path\"}]")
            fi
          done
          
          # If workflow itself changed, build all packages
          if echo "$CHANGED_FILES" | grep -q "^.github/workflows/publish-packages.yml"; then
            echo "Workflow changed - building all packages"
            PACKAGES_TO_BUILD="[]"
            for pkg_name in "${!PACKAGES[@]}"; do
              pkg_path="${PACKAGES[$pkg_name]}"
              PACKAGES_TO_BUILD=$(echo "$PACKAGES_TO_BUILD" | jq -c ". += [{\"name\": \"$pkg_name\", \"path\": \"$pkg_path\"}]")
            done
          fi
          
          echo "packages=$PACKAGES_TO_BUILD" >> $GITHUB_OUTPUT
          echo "Packages to build: $PACKAGES_TO_BUILD"

  publish:
    needs: detect-changes
    if: needs.detect-changes.outputs.packages != '[]'
    runs-on: ubuntu-latest
    environment: production
    strategy:
      matrix:
        package: ${{ fromJson(needs.detect-changes.outputs.packages) }}
      fail-fast: false
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Get Version
        id: version
        run: |
          VERSION=$(grep -oP '<Version>\K[^<]+' ${{ matrix.package.path }}/${{ matrix.package.name }}.csproj | head -1)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Publishing ${{ matrix.package.name }} version: $VERSION"

      - name: Restore
        run: dotnet restore ${{ matrix.package.path }}

      - name: Build
        run: dotnet build ${{ matrix.package.path }} -c Release --no-restore

      - name: Pack
        run: dotnet pack ${{ matrix.package.path }} -c Release -o artifacts --no-build

      - name: Configure NuGet Sources
        run: dotnet nuget update source nuget.org -s https://api.nuget.org/v3/index.json --configfile ./NuGet.config 2>/dev/null || dotnet nuget add source https://api.nuget.org/v3/index.json -n nuget.org --configfile ./NuGet.config

      - name: Push to NuGet
        env:
          NUGET_SECRET: ${{ secrets.NUGET }}
        run: |
          set -euo pipefail
          TOKEN=${NUGET_SECRET:-}
          if [ -z "$TOKEN" ]; then
            echo "No token available (NUGET secret)" >&2
            exit 1
          fi
          PACKAGE_ID="${{ matrix.package.name }}"
          VERSION="${{ steps.version.outputs.version }}"
          shopt -s nullglob
          for nupkg in artifacts/*.nupkg; do
            case "$nupkg" in
              *.snupkg) continue ;;
            esac
            dotnet nuget push "$nupkg" --source https://api.nuget.org/v3/index.json --api-key "$TOKEN" --skip-duplicate
          done
          for snupkg in artifacts/*.snupkg; do
            dotnet nuget push "$snupkg" --source https://www.nuget.org/api/v2/symbolpackage --api-key "$TOKEN" --skip-duplicate
          done
          echo "Waiting for $PACKAGE_ID $VERSION to appear on nuget.org..."
          PACKAGE_ID_LOWER=$(echo "$PACKAGE_ID" | tr '[:upper:]' '[:lower:]')
          for attempt in $(seq 1 18); do
            if curl -fsS "https://api.nuget.org/v3-flatcontainer/${PACKAGE_ID_LOWER}/${VERSION}/${PACKAGE_ID_LOWER}.${VERSION}.nupkg" -o /dev/null; then
              echo "Verified: $PACKAGE_ID $VERSION is available on nuget.org"
              exit 0
            fi
            echo "Not indexed yet (attempt $attempt/18) — waiting 10s..."
            sleep 10
          done
          echo "Package push reported success but $PACKAGE_ID $VERSION was not indexed within 3 minutes." >&2
          exit 1

      - name: Create Git Tag
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          TAG_NAME="${{ matrix.package.name }}-v${{ steps.version.outputs.version }}"
          git tag -d "$TAG_NAME" 2>/dev/null || true
          git push origin :refs/tags/"$TAG_NAME" 2>/dev/null || true
          git tag -a "$TAG_NAME" -m "${{ matrix.package.name }} ${{ steps.version.outputs.version }}"
          git push origin "$TAG_NAME"
